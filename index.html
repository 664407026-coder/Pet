<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Pet Habit Tracker V3 (All-in-One)</title>
    
    <!-- ฟอนต์สไตล์ Pixel Art และฟอนต์ภาษาไทยอ่านง่าย -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Mali:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- นำเข้า Firebase SDK (เวอร์ชัน v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-color: #1a252c;
            --panel-bg: #ecf0f1;
            --border-color: #2c3e50;
            --text-color: #2c3e50;
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #2ecc71;
            --exp: #f1c40f;
            --table-header: #bdc3c7;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Mali', cursive;
            background-color: var(--bg-color);
            background-image: linear-gradient(#2c3e50 2px, transparent 2px), linear-gradient(90deg, #2c3e50 2px, transparent 2px);
            background-size: 40px 40px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        h1, h2, h3, p, span { font-family: 'Press Start 2P', cursive; }
        h1 { font-size: 24px; color: var(--primary); text-shadow: 2px 2px 0px #000; }
        h2 { font-size: 16px; border-bottom: 4px solid var(--border-color); padding-bottom: 10px; margin-top: 0;}
        h3 { font-size: 12px; margin-bottom: 10px; }
        .hidden { display: none !important; }

        .btn-pixel {
            font-family: 'Mali', cursive;
            font-weight: 600;
            font-size: 16px;
            padding: 10px 15px;
            background-color: var(--primary);
            color: white;
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--border-color);
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn-pixel:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-color);
        }
        .btn-small { padding: 5px 10px; font-size: 11px; box-shadow: 2px 2px 0px var(--border-color); }
        .btn-danger { background-color: var(--danger); }
        .btn-success { background-color: var(--success); }

        .pixel-select {
            padding: 8px;
            border: 4px solid var(--border-color);
            font-family: 'Mali', cursive;
            font-size: 13px;
            outline: none;
            background: white;
            flex: 1;
        }

        .screen { width: 100%; max-width: 1200px; padding: 20px; box-sizing: border-box; }
        .login-box {
            background: var(--panel-bg);
            border: 6px solid var(--border-color);
            box-shadow: 8px 8px 0px #000;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
        }

        .game-app {
            display: grid;
            grid-template-columns: 1fr 1.3fr 1.2fr;
            gap: 20px;
        }

        @media (max-width: 992px) {
            .game-app { grid-template-columns: 1fr 1fr; }
            .dashboard-zone { grid-column: span 2; }
        }
        @media (max-width: 768px) {
            .game-app { grid-template-columns: 1fr; }
            .dashboard-zone { grid-column: span 1; }
        }

        .panel {
            background: var(--panel-bg);
            border: 6px solid var(--border-color);
            box-shadow: 8px 8px 0px #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info h2 { border: none; margin: 0; font-size: 14px;}

        .pixel-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Mali', cursive;
            font-size: 14px;
            font-weight: 600;
            border: 4px solid var(--border-color);
            background: white;
        }
        .pixel-table th, .pixel-table td { border: 2px solid var(--border-color); padding: 10px; }
        .pixel-table th { background-color: var(--table-header); font-family: 'Press Start 2P', cursive; font-size: 10px; }

        .stats-bar p { margin: 5px 0; font-size: 12px;}
        .pet-type-label { font-size: 9px !important; color: #555; margin-bottom: 12px !important; }
        .bar-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .bar-container span { font-size: 12px; width: 30px; }
        .bar { flex: 1; height: 20px; background: #bdc3c7; border: 4px solid var(--border-color); position: relative; }
        .fill { height: 100%; transition: width 0.3s ease; }
        .hp-fill { background: var(--danger); }
        .exp-fill { background: var(--exp); }

        .pet-container { position: relative; text-align: center; margin-top: 30px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pet-hint { font-size: 8px; color: #7f8c8d; margin-top: 15px; }
        .pet-sprite { font-size: 110px; cursor: pointer; user-select: none; animation: floating 3s ease-in-out infinite; transition: transform 0.1s; }
        .pet-sprite:hover { transform: scale(1.05); }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        .jump-anim { animation: jump 0.4s ease-out !important; }
        @keyframes jump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-35px); }
            100% { transform: translateY(0); }
        }
        .floating-heart { position: absolute; font-size: 30px; top: 20%; left: 50%; animation: floatUp 1s ease-out forwards; }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -60px) scale(1.4); }
        }

        .add-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .select-group { display: flex; gap: 10px; }
        .add-form input { padding: 10px; border: 4px solid var(--border-color); font-family: 'Mali', cursive; font-size: 15px; outline: none; }

        .task-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 380px; }
        .task-card { display: flex; justify-content: space-between; align-items: center; background: white; border: 4px solid var(--border-color); padding: 12px; }
        .task-title { display: flex; flex-direction: column; gap: 4px; font-weight: bold; font-size: 15px; }
        .task-difficulty-badge { font-family: 'Press Start 2P', cursive; font-size: 8px; }
        .diff-easy { color: var(--success); }
        .diff-medium { color: var(--exp); }
        .diff-hard { color: var(--danger); }
        .action-group { display: flex; gap: 6px; align-items: center; }
    </style>
</head>
<body>

    <!-- หน้าจอเข้าสู่ระบบ -->
    <div id="login-screen" class="screen">
        <div class="login-box">
            <h1>🐉 Pet Quest</h1>
            <p>สร้างนิสัยใหม่ เลี้ยงสัตว์พิกเซล</p>
            <button id="login-btn" class="btn-pixel btn-google">ล็อกอินด้วย Google</button>
        </div>
    </div>

    <!-- หน้าจอหลักของเกม -->
    <main id="app-screen" class="game-app screen hidden">
        
        <aside class="panel dashboard-zone">
            <div class="user-info">
                <h2>👤 <span id="player-name">Player</span></h2>
                <button id="logout-btn" class="btn-pixel btn-small btn-danger">ออกระบบ</button>
            </div>
            
            <div class="dashboard-stats">
                <h3>📊 สถิติพฤติกรรมสะสม</h3>
                <table class="pixel-table">
                    <thead>
                        <tr>
                            <th>กิจกรรม</th>
                            <th>จำนวนครั้ง</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>🍎 การกิน</td><td id="stat-eat">0</td></tr>
                        <tr><td>💤 การพักผ่อน</td><td id="stat-rest">0</td></tr>
                        <tr><td>🏃 ออกกำลังกาย</td><td id="stat-workout">0</td></tr>
                        <tr><td>❤️ เล่นกับสัตว์</td><td id="stat-play">0</td></tr>
                    </tbody>
                </table>
            </div>
        </aside>

        <section class="panel pet-zone">
            <div class="stats-bar">
                <p>LVL: <span id="pet-level">1</span></p>
                <p class="pet-type-label">สายพันธุ์: <span id="pet-type-name">กำลังสุ่ม...</span></p>
                <div class="bar-container">
                    <span>HP</span>
                    <div class="bar"><div id="hp-fill" class="fill hp-fill" style="width: 100%;"></div></div>
                </div>
                <div class="bar-container">
                    <span>EXP</span>
                    <div class="bar"><div id="exp-fill" class="fill exp-fill" style="width: 0%;"></div></div>
                </div>
            </div>
            
            <div class="pet-container">
                <div class="pet-sprite" title="คลิกเพื่อเล่นด้วย!">🥚</div>
                <p class="pet-hint">(คลิกที่สัตว์เลี้ยงเพื่อเล่นด้วย)</p>
            </div>
        </section>

        <section class="panel quest-zone">
            <h2>📋 Daily Quests</h2>
            <form id="add-quest-form" class="add-form">
                <div class="select-group">
                    <select id="quest-category" class="pixel-select">
                        <option value="eat">🍎 กิน</option>
                        <option value="rest">💤 พักผ่อน</option>
                        <option value="workout">🏃 ออกกำลัง</option>
                        <option value="other">⭐ ทั่วไป</option>
                    </select>
                    <select id="quest-difficulty" class="pixel-select">
                        <option value="easy">🟢 ง่าย (+10 EXP)</option>
                        <option value="medium" selected>🟡 กลาง (+20 EXP)</option>
                        <option value="hard">🔴 ยาก (+45 EXP)</option>
                    </select>
                </div>
                <input type="text" id="quest-input" placeholder="พิมพ์เป้าหมายที่คุณอยากทำ..." required autocomplete="off">
                <button type="submit" class="btn-pixel">เพิ่มเควสต์</button>
            </form>
            <div id="task-list" class="task-list"></div>
        </section>
    </main>

    <script>
        // -----------------------------------------------------
        // ⚠️ ใส่ข้อมูล Firebase Config ของคุณตรงนี้
        // -----------------------------------------------------
        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_PROJECT_ID.appspot.com",
          messagingSenderId: "YOUR_SENDER_ID",
          appId: "YOUR_APP_ID"
        };

        // เริ่มต้นใช้งาน Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Elements
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const playerName = document.getElementById('player-name');
        const petLevelEl = document.getElementById('pet-level');
        const petTypeName = document.getElementById('pet-type-name');
        const expFill = document.getElementById('exp-fill');
        const petSprite = document.querySelector('.pet-sprite');
        const petContainer = document.querySelector('.pet-container');
        const addQuestForm = document.getElementById('add-quest-form');
        const questInput = document.getElementById('quest-input');
        const questCategory = document.getElementById('quest-category');
        const questDifficulty = document.getElementById('quest-difficulty');
        const taskList = document.getElementById('task-list');

        // Stats Elements
        const statEat = document.getElementById('stat-eat');
        const statRest = document.getElementById('stat-rest');
        const statWorkout = document.getElementById('stat-workout');
        const statPlay = document.getElementById('stat-play');

        let currentUser = null;
        let petData = null;
        let localStats = { eat: 0, rest: 0, workout: 0, play: 0 };
        const petTypes = ['beast', 'bird', 'dragon'];

        // Authentication
        loginBtn.addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(console.error);
        });

        logoutBtn.addEventListener('click', () => auth.signOut());

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                playerName.textContent = user.displayName.split(' ')[0];
                initPetData();
                loadQuests();
            } else {
                currentUser = null;
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        // Initialize Pet Data & Random System
        function initPetData() {
            const userRef = db.collection('users').doc(currentUser.uid);
            userRef.onSnapshot((doc) => {
                if (doc.exists) {
                    petData = doc.data();
                    updatePetUI();
                    localStats = petData.stats || { eat: 0, rest: 0, workout: 0, play: 0 };
                    updateDashboardUI();
                } else {
                    const randomType = petTypes[Math.floor(Math.random() * petTypes.length)];
                    userRef.set({
                        level: 1,
                        exp: 0,
                        hp: 100,
                        petType: randomType,
                        stats: { eat: 0, rest: 0, workout: 0, play: 0 }
                    });
                }
            });
        }

        // Evolution System
        function updatePetUI() {
            petLevelEl.textContent = petData.level;
            expFill.style.width = `${petData.exp}%`;
            
            const lvl = petData.level;
            const type = petData.petType || 'beast';
            let sprite = '🥚'; 
            
            const typeDisplayNames = { beast: 'สัตว์จอมพลัง 🦊', bird: 'ปักษาเวหา 🦅', dragon: 'มังกรโบราณ 🐉' };
            petTypeName.textContent = typeDisplayNames[type] || 'ไข่ปริศนา';

            if (lvl >= 5) {
                if (type === 'beast') {
                    if (lvl >= 30) sprite = '🦁';
                    else if (lvl >= 20) sprite = '🐯';
                    else if (lvl >= 15) sprite = '🦊';
                    else sprite = '🐱';
                } else if (type === 'bird') {
                    if (lvl >= 30) sprite = '🦚';
                    else if (lvl >= 20) sprite = '🦅';
                    else if (lvl >= 15) sprite = '🦆';
                    else sprite = '🐥';
                } else if (type === 'dragon') {
                    if (lvl >= 30) sprite = '🐉';
                    else if (lvl >= 20) sprite = '🦖';
                    else if (lvl >= 15) sprite = '🐢';
                    else sprite = '🦎';
                }
            }
            petSprite.textContent = sprite;
        }

        function updateDashboardUI() {
            statEat.textContent = localStats.eat || 0;
            statRest.textContent = localStats.rest || 0;
            statWorkout.textContent = localStats.workout || 0;
            statPlay.textContent = localStats.play || 0;
        }

        // Play Animation
        petSprite.addEventListener('click', () => {
            petSprite.classList.add('jump-anim');
            const heart = document.createElement('div');
            heart.textContent = ['❤️', '✨', '🎵'][Math.floor(Math.random() * 3)];
            heart.className = 'floating-heart';
            petContainer.appendChild(heart);
            
            localStats.play += 1;
            updateDashboardUI();
            db.collection('users').doc(currentUser.uid).update({ 'stats.play': localStats.play });

            setTimeout(() => {
                petSprite.classList.remove('jump-anim');
                heart.remove();
            }, 1000);
        });

        // Add Quest
        addQuestForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = questInput.value.trim();
            const category = questCategory.value;
            const difficulty = questDifficulty.value;
            if (!title) return;

            db.collection('users').doc(currentUser.uid).collection('habits').add({
                title: title,
                category: category,
                difficulty: difficulty,
                lastCompleted: null
            }).then(() => { questInput.value = ''; });
        });

        // Load & Hide Completed Quests
        function loadQuests() {
            db.collection('users').doc(currentUser.uid).collection('habits')
                .onSnapshot((snapshot) => {
                    taskList.innerHTML = '';
                    snapshot.forEach((doc) => {
                        const quest = doc.data();
                        let isDoneToday = false;
                        
                        if (quest.lastCompleted) {
                            const lastDate = quest.lastCompleted.toDate().toDateString();
                            isDoneToday = (lastDate === new Date().toDateString());
                        }
                        
                        if (isDoneToday) return; // ข้ามการแสดงผลถ้าทำเสร็จไปแล้ววันนี้

                        renderQuestCard(doc.id, quest.title, quest.category, quest.difficulty);
                    });
                });
        }

        function getCategoryIcon(cat) {
            switch(cat) {
                case 'eat': return '🍎';
                case 'rest': return '💤';
                case 'workout': return '🏃';
                default: return '⭐';
            }
        }

        // Render Cards with Delete and Done buttons
        function renderQuestCard(id, title, category, difficulty) {
            const card = document.createElement('div');
            card.className = 'task-card';
            
            const textContainer = document.createElement('div');
            textContainer.className = 'task-title';
            const diffTexts = { easy: 'ง่าย', medium: 'กลาง', hard: 'ยาก' };
            
            textContainer.innerHTML = `
                <div>${getCategoryIcon(category)} ${title}</div>
                <span class="task-difficulty-badge diff-${difficulty}">[${diffTexts[difficulty] || 'กลาง'}]</span>
            `;
            
            const actionGroup = document.createElement('div');
            actionGroup.className = 'action-group';

            const btnDone = document.createElement('button');
            btnDone.className = 'btn-pixel btn-small btn-success';
            btnDone.textContent = 'ทำแล้ว';
            btnDone.onclick = () => completeQuest(id, category, difficulty);

            const btnDelete = document.createElement('button');
            btnDelete.className = 'btn-pixel btn-small btn-danger';
            btnDelete.textContent = '🗑️';
            btnDelete.onclick = () => {
                if(confirm('ต้องการลบเป้าหมายนี้ใช่หรือไม่?')) {
                    db.collection('users').doc(currentUser.uid).collection('habits').doc(id).delete();
                }
            };

            actionGroup.appendChild(btnDone);
            actionGroup.appendChild(btnDelete);
            card.appendChild(textContainer);
            card.appendChild(actionGroup);
            taskList.appendChild(card);
        }

        // Complete Quest & Gain EXP
        function completeQuest(questId, category, difficulty) {
            const userRef = db.collection('users').doc(currentUser.uid);
            const questRef = userRef.collection('habits').doc(questId);
            
            questRef.update({ lastCompleted: firebase.firestore.FieldValue.serverTimestamp() });

            let expGained = 20; 
            if (difficulty === 'easy') expGained = 10;
            else if (difficulty === 'hard') expGained = 45;

            let newExp = petData.exp + expGained;
            let newLevel = petData.level;
            let isLevelUp = false;

            while (newExp >= 100) {
                newLevel += 1;
                newExp -= 100;
                isLevelUp = true;
            }

            if (isLevelUp) {
                alert(`🎉 ยินดีด้วย! สัตว์เลี้ยงของคุณเลื่อนระดับเป็น LVL ${newLevel}! ร่างกายเริ่มวิวัฒนาการแล้ว!`);
            }

            if (category !== 'other') localStats[category] += 1;

            userRef.update({
                exp: newExp,
                level: newLevel,
                stats: localStats
            });
        }
    </script>
</body>
</html>
